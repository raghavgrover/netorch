name: Print Hostnames
description: What this workflow does
parameters: []
vars: {}
steps:
  - name: Types hostname once locally
    type: shell
    run: once
    script: hostname
  - name: Prints hostname locally - number of times the number of devices (twice for 2 devices)
    type: shell
    run: per_device
    script: hostname
  - name: Runs command on the remote device
    type: device_commands
    commands:
      - hostname
