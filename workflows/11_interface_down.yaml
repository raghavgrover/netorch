name: Interface Down — Check and Remediate
description: >
  Identifies administratively down interfaces on a network device and brings
  them up with "no shutdown". Runs a post-remediation check to confirm.
  Uses the native netorch SSH driver for Cisco IOS/IOS-XE devices.

  Platform support:
    cisco_ios / cisco_xe : Fully supported. Uses device_commands + device_config.
    aruba_aoscx          : NOT supported by netorch. No Netmiko driver exists
                           for Aruba AOS-CX. The original Ansible role uses
                           the arubanetworks.aoscx collection (proprietary).
                           Workaround: use a platform=linux device entry with
                           sshpass if the AOS-CX SSH CLI is accessible.

  *** MONITORING LOOP NOTE ***
  The original shell script (11_Interface_Down.sh) included a 15-minute
  polling loop that repeatedly checked interface state. This is NOT directly
  convertible to a netorch workflow because:
    1. Workflow steps are synchronous — the step must complete before the next
       runs. A blocking 15-minute sleep inside a step would hold the job slot.
    2. The workflow result is captured at step completion, not during a loop.
  Recommendation: Run this workflow once to trigger remediation; schedule it
  via a cron job or BigFix recurring action for periodic monitoring.

  Target devices must be in netorch inventory with platform=cisco_ios or
  cisco_xe.

parameters:
  - TARGET_INTERFACE
    # Interface to bring up if it is administratively shutdown
    # e.g. GigabitEthernet0/1   or   Ethernet0/0
    # Leave blank to check ALL interfaces (post-check step will show all).

vars:
  TARGET_INTERFACE: ""

# ─── STEP MAPPING ────────────────────────────────────────────────────────────
#  Step 1 — device_commands : Check interface status
#  Step 2 — device_config   : Apply "no shutdown" to the target interface
#  Step 3 — device_commands : Post-remediation verification
# ─────────────────────────────────────────────────────────────────────────────

steps:
  - name: check_interface_status
    type: device_commands
    commands:
      - "show interfaces status"
      - "show ip interface brief"

  - name: bring_up_interface
    type: device_config
    commands:
      - "interface {{ TARGET_INTERFACE }}"
      - "no shutdown"
      - "exit"

  - name: verify_interface_state
    type: device_commands
    commands:
      - "show interfaces {{ TARGET_INTERFACE }} status"
      - "show ip interface brief | include {{ TARGET_INTERFACE }}"
