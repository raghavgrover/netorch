name: Network Device Reboot Reason (Junos)
description: >
  Retrieves the last reboot reason for Juniper Junos devices via the native
  netorch Junos SSH driver. Complement to 10_network_reboot_reason.yaml
  which targets Cisco IOS/IOS-XE devices.

  Target devices must be in netorch inventory with platform=juniper_junos.

parameters: []

# ─── STEP MAPPING ────────────────────────────────────────────────────────────
#  Step 1 — device_commands : show chassis routing-engine (reboot reason)
# ─────────────────────────────────────────────────────────────────────────────

steps:
  - name: get_reboot_reason_junos
    type: device_commands
    commands:
      - "show chassis routing-engine | match reboot"
      - "show log messages | match reboot | last 20"
