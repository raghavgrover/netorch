name: NX-OS Create and Apply ACL
description: >
  Creates an IP Access Control List on a Cisco NX-OS switch and applies it to
  a specified interface. Uses the native netorch NX-OS SSH driver
  (platform: cisco_nxos in inventory) for all device interactions.

  For a single ACL and interface binding:
    - Step 1: Check existing ACLs (pre-flight read)
    - Step 2: Create/update the ACL entries in config mode
    - Step 3: Apply the ACL to the target interface in the given direction
    - Step 4: Verify deployment

  Multi-ACL note: The original Ansible role supports multiple ACLs via a "::"
  delimited string. In netorch, this workflow handles one ACL at a time for
  clarity and reliability with the native driver. To create multiple ACLs, run
  the workflow multiple times (once per ACL) or extend with additional steps.

parameters:
  - ACL_NAME          # Name of the ACL e.g. BLOCK_EXTERNAL
  - ACL_SEQUENCE      # Sequence number e.g. 10
  - ACL_ACTION        # permit | deny
  - ACL_PROTOCOL      # ip | tcp | udp | icmp
  - ACL_SOURCE        # e.g. 10.0.0.0/8 or any
  - ACL_DESTINATION   # e.g. 192.168.1.0/24 or any
  - TARGET_INTERFACE  # Interface to bind ACL e.g. Ethernet1/1
  - ACL_DIRECTION     # in | out

vars:
  ACL_SEQUENCE: "10"
  ACL_PROTOCOL: ip

# ─── STEP MAPPING ────────────────────────────────────────────────────────────
#  Step 1 — device_commands : Check existing ACLs (pre-flight)
#  Step 2 — device_config   : Create ACL entry
#  Step 3 — device_config   : Apply ACL to interface
#  Step 4 — device_commands : Verify ACL and interface binding
#
#  Target devices must be in netorch inventory with platform=cisco_nxos.
# ─────────────────────────────────────────────────────────────────────────────

steps:
  - name: check_existing_acls
    type: device_commands
    commands:
      - "show ip access-lists"
      - "show running-config | section ip access-list"

  - name: create_acl
    type: device_config
    commands:
      - "ip access-list {{ ACL_NAME }}"
      - "  {{ ACL_SEQUENCE }} {{ ACL_ACTION }} {{ ACL_PROTOCOL }} {{ ACL_SOURCE }} {{ ACL_DESTINATION }}"
      - "exit"

  - name: apply_acl_to_interface
    type: device_config
    commands:
      - "interface {{ TARGET_INTERFACE }}"
      - "  ip access-group {{ ACL_NAME }} {{ ACL_DIRECTION }}"
      - "exit"

  - name: verify_acl_deployment
    type: device_commands
    commands:
      - "show ip access-lists {{ ACL_NAME }}"
      - "show running-config interface {{ TARGET_INTERFACE }}"
