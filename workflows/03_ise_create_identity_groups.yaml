name: Cisco ISE Create Identity Groups
description: >
  Creates a new Identity Group on a Cisco ISE node via the ERS REST API.
  Checks whether the group already exists before attempting creation.
  Runs entirely from the relay machine — no SSH to network inventory devices.

parameters:
  - ISE_HOSTNAME          # ISE IP or FQDN (no port/scheme)
  - ISE_USERNAME
  - ISE_PASSWORD
  - IDENTITY_GROUP_NAME   # Name of the new identity group
  - DESCRIPTION           # Description for the group
  - PARENT_GROUP          # Parent group name e.g. "NAD:All Device Types"

# ─── STEP MAPPING ────────────────────────────────────────────────────────────
#  All operations target the ISE ERS API on port 9060.
#  Step type: run_shell_script_locally / once
# ─────────────────────────────────────────────────────────────────────────────

steps:
  - name: create_identity_group
    type: run_shell_script_locally
    run: once
    script: |
      #!/bin/bash
      set -euo pipefail

      ISE_HOSTNAME="{{ ISE_HOSTNAME }}"
      ISE_USERNAME="{{ ISE_USERNAME }}"
      ISE_PASSWORD="{{ ISE_PASSWORD }}"
      IDENTITY_GROUP_NAME="{{ IDENTITY_GROUP_NAME }}"
      DESCRIPTION="{{ DESCRIPTION }}"
      PARENT_GROUP="{{ PARENT_GROUP }}"

      ISE_AUTH=$(echo -n "${ISE_USERNAME}:${ISE_PASSWORD}" | base64)
      ISE_API="https://${ISE_HOSTNAME}:9060/ers/config"

      # ── Step 1: Check if identity group already exists ───────────────────
      echo ">>> Checking if identity group '${IDENTITY_GROUP_NAME}' already exists ..."
      ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${IDENTITY_GROUP_NAME}'))")
      CHECK=$(curl -s -k -X GET \
        -H "Accept: application/json" \
        -H "Authorization: Basic ${ISE_AUTH}" \
        "${ISE_API}/identitygroup?filter=name.EQ.${ENCODED}")
      TOTAL=$(echo "$CHECK" | python3 -c \
        "import sys,json; print(json.load(sys.stdin).get('SearchResult',{}).get('total',0))" 2>/dev/null || echo "0")

      if [ "$TOTAL" -gt 0 ]; then
        echo "INFO: Identity group '${IDENTITY_GROUP_NAME}' already exists. No action needed."
        exit 0
      fi
      echo "Group does not exist — creating."

      # ── Step 2: Create the identity group ───────────────────────────────
      echo ""
      echo ">>> Creating identity group '${IDENTITY_GROUP_NAME}' ..."
      PAYLOAD=$(cat <<EOF
      {
        "IdentityGroup": {
          "name": "${IDENTITY_GROUP_NAME}",
          "description": "${DESCRIPTION}",
          "parent": "${PARENT_GROUP}"
        }
      }
      EOF
      )
      RESPONSE=$(curl -s -k -X POST \
        -H "Content-Type: application/json" \
        -H "Accept: application/json" \
        -H "Authorization: Basic ${ISE_AUTH}" \
        -d "$PAYLOAD" \
        "${ISE_API}/identitygroup")
      echo "ISE response: $RESPONSE"

      # ── Step 3: Verify creation ──────────────────────────────────────────
      echo ""
      echo ">>> Verifying group creation ..."
      VERIFY=$(curl -s -k -X GET \
        -H "Accept: application/json" \
        -H "Authorization: Basic ${ISE_AUTH}" \
        "${ISE_API}/identitygroup?filter=name.EQ.${ENCODED}")
      VERIFIED=$(echo "$VERIFY" | python3 -c \
        "import sys,json; print(json.load(sys.stdin).get('SearchResult',{}).get('total',0))" 2>/dev/null || echo "0")
      if [ "$VERIFIED" -eq 0 ]; then
        echo "ERROR: Identity group not found after creation. Manual check required."
        exit 1
      fi
      echo "SUCCESS: Identity group '${IDENTITY_GROUP_NAME}' created on ISE ${ISE_HOSTNAME}."
