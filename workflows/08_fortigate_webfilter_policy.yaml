name: FortiGate Web Filter Policy Creation
description: >
  Creates a complete web filtering policy on a FortiGate firewall via the
  FortiOS REST API. The sequence is:
    1. Duplicate check (policy ID and name)
    2. Enable Web Filter feature
    3. Create URL filter list
    4. Create Web Filter profile using the URL filter
    5. Create recurring schedule
    6. Create firewall policy with web filter profile attached
    7. Reorder policy before existing policies on the same interface pair
    8. Verify policy deployment

  *** REST API vs SSH NOTE ***
  Although netorch has a FortinetDriver (SSH/Netmiko) for CLI-based operations,
  this use case manages FortiOS objects (URL filters, web filter profiles,
  firewall policies) that are most reliably created via the FortiOS REST API.
  The netorch SSH driver is better suited for show commands and simple config
  blocks, not complex object hierarchies. Therefore this workflow uses
  run_shell_script_locally to call the REST API from the relay machine.

  Prerequisites on relay: curl, python3

parameters:
  - TARGET_HOST           # FortiGate IP or FQDN
  - FORTIGATE_API_TOKEN   # REST API token (from FortiGate admin)
  - VDOM                  # VDOM name (default: root)
  - POLICY_NAME           # Firewall policy name
  - POLICY_ID             # Integer policy ID
  - SRC_INTERFACE         # Source interface e.g. internal
  - DEST_INTERFACE        # Destination interface e.g. wan1
  - SRC_ADDRESS           # Address object name e.g. all
  - DEST_ADDRESS          # Address object name e.g. all
  - SERVICE_NAME          # Space-separated services e.g. "HTTP HTTPS"
  - URL_LIST              # Space-separated URLs to block/filter
  - URL_FILTER_TYPE       # simple | regex | wildcard
  - URL_FILTER_ACTION     # block | exempt
  - WEB_FILTER_NAME       # Web filter profile name
  - WEB_FILTER_COMMENT    # Description for the profile
  - SCHEDULE_NAME         # Recurring schedule name
  - SCHEDULED_DAYS        # Space-separated days e.g. "monday tuesday"
  - SCHEDULE_START_TIME   # HH:MM e.g. 08:00
  - SCHEDULE_END_TIME     # HH:MM e.g. 18:00

vars:
  VDOM: root
  URL_FILTER_TYPE: simple
  URL_FILTER_ACTION: block

# ─── STEP MAPPING ────────────────────────────────────────────────────────────
#  All operations use the FortiOS REST API.
#  Step type: run_shell_script_locally / once
# ─────────────────────────────────────────────────────────────────────────────

steps:
  - name: create_webfilter_policy
    type: run_shell_script_locally
    run: once
    script: |
      #!/bin/bash
      set -euo pipefail

      TARGET_HOST="{{ TARGET_HOST }}"
      API_TOKEN="{{ FORTIGATE_API_TOKEN }}"
      VDOM="{{ VDOM }}"
      POLICY_NAME="{{ POLICY_NAME }}"
      POLICY_ID="{{ POLICY_ID }}"
      SRC_INTERFACE="{{ SRC_INTERFACE }}"
      DEST_INTERFACE="{{ DEST_INTERFACE }}"
      SRC_ADDRESS="{{ SRC_ADDRESS }}"
      DEST_ADDRESS="{{ DEST_ADDRESS }}"
      SERVICE_NAME="{{ SERVICE_NAME }}"
      URL_LIST="{{ URL_LIST }}"
      URL_FILTER_TYPE="{{ URL_FILTER_TYPE }}"
      URL_FILTER_ACTION="{{ URL_FILTER_ACTION }}"
      WEB_FILTER_NAME="{{ WEB_FILTER_NAME }}"
      WEB_FILTER_COMMENT="{{ WEB_FILTER_COMMENT }}"
      SCHEDULE_NAME="{{ SCHEDULE_NAME }}"
      SCHEDULED_DAYS="{{ SCHEDULED_DAYS }}"
      SCHEDULE_START_TIME="{{ SCHEDULE_START_TIME }}"
      SCHEDULE_END_TIME="{{ SCHEDULE_END_TIME }}"

      FG_API="https://${TARGET_HOST}/api/v2/cmdb"
      AUTH_HEADER="Authorization: Bearer ${API_TOKEN}"

      _get() {
        curl -s -k -X GET -H "$AUTH_HEADER" "$1"
      }
      _post() {
        curl -s -k -X POST -H "$AUTH_HEADER" -H "Content-Type: application/json" -d "$1" "$2"
      }
      _put() {
        curl -s -k -X PUT  -H "$AUTH_HEADER" -H "Content-Type: application/json" -d "$1" "$2"
      }

      # ── Step 1: Check for duplicate policy ID or name ─────────────────────
      echo ">>> Step 1: Checking for duplicate policy in VDOM '${VDOM}' ..."
      EXISTING=$(_get "${FG_API}/firewall/policy?vdom=${VDOM}")
      DUPE=$(echo "$EXISTING" | python3 -c "
      import sys,json
      data = json.load(sys.stdin)
      results = data.get('results', [])
      ids   = [str(p.get('policyid','')) for p in results]
      names = [p.get('name','') for p in results]
      dupe_id   = '${POLICY_ID}' in ids
      dupe_name = '${POLICY_NAME}' in names
      if dupe_id or dupe_name:
          reasons = []
          if dupe_id:   reasons.append('ID ${POLICY_ID}')
          if dupe_name: reasons.append('name ${POLICY_NAME}')
          print('DUPLICATE: ' + ', '.join(reasons))
      else:
          print('OK')
      " 2>/dev/null || echo "OK")
      if [[ "$DUPE" == DUPLICATE* ]]; then
        echo "ERROR: ${DUPE} already exists. Stopping."; exit 2
      fi
      echo "No duplicate found."

      # ── Step 2: Enable Web Filter ─────────────────────────────────────────
      echo ""
      echo ">>> Step 2: Enabling Web Filter feature ..."
      _put '{"gui-webfilter": "enable"}' \
        "${FG_API}/system/settings?vdom=${VDOM}" | python3 -m json.tool 2>/dev/null || true
      echo "Web Filter enabled."

      # ── Step 3: Create URL filter entries ────────────────────────────────
      echo ""
      echo ">>> Step 3: Creating URL filter list ..."
      URL_ENTRIES_JSON=$(python3 -c "
      import json
      urls = '${URL_LIST}'.split()
      entries = [{'id': i+1, 'url': u, 'type': '${URL_FILTER_TYPE}', 'action': '${URL_FILTER_ACTION}'}
                 for i, u in enumerate(urls)]
      print(json.dumps(entries))
      ")
      URL_FILTER_PAYLOAD="{\"id\": 15, \"name\": \"URL_Filter\", \"entries\": ${URL_ENTRIES_JSON}}"
      _post "$URL_FILTER_PAYLOAD" \
        "${FG_API}/webfilter/urlfilter?vdom=${VDOM}" | python3 -m json.tool 2>/dev/null || true
      echo "URL filter list created."

      # ── Step 4: Create Web Filter profile ────────────────────────────────
      echo ""
      echo ">>> Step 4: Creating Web Filter profile '${WEB_FILTER_NAME}' ..."
      WF_PAYLOAD="{\"name\": \"${WEB_FILTER_NAME}\", \"comment\": \"${WEB_FILTER_COMMENT}\", \"web\": {\"urlfilter-table\": 15}}"
      _post "$WF_PAYLOAD" \
        "${FG_API}/webfilter/profile?vdom=${VDOM}" | python3 -m json.tool 2>/dev/null || true
      echo "Web Filter profile created."

      # ── Step 5: Create recurring schedule ────────────────────────────────
      echo ""
      echo ">>> Step 5: Creating schedule '${SCHEDULE_NAME}' ..."
      DAYS_JSON=$(python3 -c "import json; print(json.dumps('${SCHEDULED_DAYS}'.split()))")
      SCHED_PAYLOAD="{\"name\": \"${SCHEDULE_NAME}\", \"color\": 0, \"day\": ${DAYS_JSON}, \"start\": \"${SCHEDULE_START_TIME}\", \"end\": \"${SCHEDULE_END_TIME}\", \"fabric-object\": \"enable\"}"
      _post "$SCHED_PAYLOAD" \
        "${FG_API}/firewall/schedule/recurring?vdom=${VDOM}" | python3 -m json.tool 2>/dev/null || true
      echo "Schedule created."

      # ── Step 6: Create firewall policy ───────────────────────────────────
      echo ""
      echo ">>> Step 6: Creating firewall policy '${POLICY_NAME}' (ID: ${POLICY_ID}) ..."
      SERVICES_JSON=$(python3 -c "import json; print(json.dumps([{'name': s} for s in '${SERVICE_NAME}'.split()]))")
      POLICY_PAYLOAD=$(python3 -c "
      import json
      body = {
        'policyid': int('${POLICY_ID}'),
        'name': '${POLICY_NAME}',
        'srcintf': [{'name': '${SRC_INTERFACE}'}],
        'dstintf': [{'name': '${DEST_INTERFACE}'}],
        'srcaddr': [{'name': '${SRC_ADDRESS}'}],
        'dstaddr': [{'name': '${DEST_ADDRESS}'}],
        'action': 'accept',
        'schedule': '${SCHEDULE_NAME}',
        'service': ${SERVICES_JSON},
        'logtraffic': 'all',
        'utm-status': 'enable',
        'nat': 'enable',
        'webfilter-profile': '${WEB_FILTER_NAME}',
        'ssl-ssh-profile': 'certificate-inspection',
        'status': 'enable'
      }
      print(json.dumps(body))
      ")
      _post "$POLICY_PAYLOAD" \
        "${FG_API}/firewall/policy?vdom=${VDOM}" | python3 -m json.tool 2>/dev/null || true
      echo "Firewall policy created."

      # ── Step 7: Reorder policy ────────────────────────────────────────────
      echo ""
      echo ">>> Step 7: Reordering policy to correct position ..."
      UPDATED_LIST=$(_get "${FG_API}/firewall/policy?vdom=${VDOM}")
      LOWEST_ID=$(echo "$UPDATED_LIST" | python3 -c "
      import sys, json
      data = json.load(sys.stdin)
      ids = [p['policyid'] for p in data.get('results', [])
             if p.get('srcintf', [{}])[0].get('name','') == '${SRC_INTERFACE}'
             and p.get('dstintf', [{}])[0].get('name','') == '${DEST_INTERFACE}'
             and p['policyid'] != int('${POLICY_ID}')]
      print(min(ids) if ids else '')
      " 2>/dev/null || echo "")
      if [ -n "$LOWEST_ID" ]; then
        _put "{\"action\": \"move\", \"before\": \"${LOWEST_ID}\"}" \
          "${FG_API}/firewall/policy/${POLICY_ID}?vdom=${VDOM}&action=move&before=${LOWEST_ID}" | python3 -m json.tool 2>/dev/null || true
        echo "Policy moved before policy ID ${LOWEST_ID}."
      else
        echo "No existing policies on the same interface pair. No reorder needed."
      fi

      # ── Step 8: Verify deployment ─────────────────────────────────────────
      echo ""
      echo ">>> Step 8: Verifying policy deployment ..."
      VERIFY=$(_get "${FG_API}/firewall/policy/${POLICY_ID}?vdom=${VDOM}")
      WF_CHECK=$(echo "$VERIFY" | python3 -c \
        "import sys,json; r=json.load(sys.stdin).get('results',[{}]); print(r[0].get('webfilter-profile','MISSING') if r else 'MISSING')" 2>/dev/null)
      if [ "$WF_CHECK" = "$WEB_FILTER_NAME" ]; then
        echo "SUCCESS: Policy '${POLICY_NAME}' deployed with web filter '${WEB_FILTER_NAME}' on ${TARGET_HOST}."
      else
        echo "WARNING: Web filter profile mismatch. Expected '${WEB_FILTER_NAME}', got '${WF_CHECK}'."
        echo "Verify manually on the FortiGate."
        exit 1
      fi
