name: Cisco WLC AireOS Configure New SSID
description: >
  Configures a new WLAN/SSID on a Cisco Wireless LAN Controller running AireOS.
  Steps: Create WLAN → Assign interface → Set WPA PSK security (auto-generated
  key) → Enable WLAN.

  *** PLATFORM INFEASIBILITY NOTE ***
  Cisco WLC AireOS uses a proprietary CLI that is NOT supported by Netmiko or
  the netorch driver framework. The AireOS CLI is distinct from IOS, IOS-XE,
  and IOS-XR — it does not enter a standard "config terminal" mode. There is no
  community.network.aireos driver equivalent in Netmiko.

  As a result, device_commands and device_config step types CANNOT be used
  for WLC AireOS. This workflow uses run_shell_script_locally with sshpass to
  send CLI commands to the WLC over SSH from the relay machine.

  Prerequisites on the relay machine:
    yum install -y sshpass openssl

parameters:
  - WLC_HOST          # WLC management IP or FQDN
  - WLC_SSH_USER      # WLC admin username
  - WLC_SSH_PASSWORD  # WLC admin password
  - WLAN_ID           # WLAN slot ID (1-512)
  - SSID_NAME         # SSID / profile name e.g. Corp-WiFi
  - INTERFACE_NAME    # Management interface name e.g. management

# ─── STEP MAPPING ────────────────────────────────────────────────────────────
#  INFEASIBLE as device_commands / device_config — WLC AireOS not in Netmiko
#  Step type: run_shell_script_locally / once (single WLC target)
# ─────────────────────────────────────────────────────────────────────────────

steps:
  - name: configure_new_ssid
    type: run_shell_script_locally
    run: once
    script: |
      #!/bin/bash
      # WLC AireOS SSH via sshpass — Netmiko/netorch does not support AireOS.
      set -euo pipefail

      WLC_HOST="{{ WLC_HOST }}"
      WLC_SSH_USER="{{ WLC_SSH_USER }}"
      WLC_SSH_PASSWORD="{{ WLC_SSH_PASSWORD }}"
      WLAN_ID="{{ WLAN_ID }}"
      SSID_NAME="{{ SSID_NAME }}"
      INTERFACE_NAME="{{ INTERFACE_NAME }}"

      # Generate a random 8-character WPA PSK
      SECURITY_KEY=$(openssl rand -base64 12 | tr -dc 'a-zA-Z0-9' | head -c 8)

      SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=15"

      _wlc_cmd() {
        local CMD="$1"
        sshpass -p "${WLC_SSH_PASSWORD}" ssh $SSH_OPTS \
          "${WLC_SSH_USER}@${WLC_HOST}" "$CMD" 2>&1 || true
      }

      # ── Step 1: Create WLAN ───────────────────────────────────────────────
      echo ">>> Step 1: Creating WLAN ${WLAN_ID} '${SSID_NAME}' ..."
      OUT=$(_wlc_cmd "config wlan create ${WLAN_ID} ${SSID_NAME} ${SSID_NAME}")
      echo "$OUT"
      if echo "$OUT" | grep -qi "error\|fail\|already"; then
        echo "WARNING: Possible issue creating WLAN. Review output above."
      fi

      # ── Step 2: Assign interface ──────────────────────────────────────────
      echo ""
      echo ">>> Step 2: Assigning interface '${INTERFACE_NAME}' to WLAN ${WLAN_ID} ..."
      OUT=$(_wlc_cmd "config wlan interface ${WLAN_ID} ${INTERFACE_NAME}")
      echo "$OUT"

      # ── Step 3: Set WPA PSK security ─────────────────────────────────────
      echo ""
      echo ">>> Step 3: Configuring WPA PSK security ..."
      OUT=$(sshpass -p "${WLC_SSH_PASSWORD}" ssh $SSH_OPTS \
        "${WLC_SSH_USER}@${WLC_HOST}" \
        "config wlan security wpa akm psk set-key ascii ${SECURITY_KEY} ${WLAN_ID}" 2>&1 || true)
      echo "$OUT"

      # ── Step 4: Enable the WLAN ───────────────────────────────────────────
      echo ""
      echo ">>> Step 4: Enabling WLAN ${WLAN_ID} ..."
      OUT=$(_wlc_cmd "config wlan enable ${WLAN_ID}")
      echo "$OUT"

      echo ""
      echo ">>> WLC SSID configuration complete."
      echo "    SSID: ${SSID_NAME}  (WLAN ID: ${WLAN_ID})"
      echo "    Security Key: ${SECURITY_KEY}"
      echo "    NOTE: Record the security key — it is not stored by netorch."
