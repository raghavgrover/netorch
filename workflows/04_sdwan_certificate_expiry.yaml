name: Cisco SD-WAN Certificate Expiry Report
description: >
  Authenticates to Cisco vManage and retrieves certificate records for all
  Viptela devices. Computes remaining validity days for each certificate and
  produces a CSV report at /tmp/sdwan_cert_expiry_report.csv on the relay
  machine. Devices expiring within EXPIRY_THRESHOLD_DAYS are flagged.
  Runs entirely from the relay machine via vManage REST API.

parameters:
  - VMANAGE_HOST           # vManage IP or FQDN (no https://)
  - VMANAGE_USERNAME
  - VMANAGE_PASSWORD
  - EXPIRY_THRESHOLD_DAYS  # Flag devices expiring within this many days

vars:
  EXPIRY_THRESHOLD_DAYS: "99"

# ─── STEP MAPPING ────────────────────────────────────────────────────────────
#  All operations target the vManage REST API (HTTPS).
#  Step type: run_shell_script_locally / once
# ─────────────────────────────────────────────────────────────────────────────

steps:
  - name: check_certificate_expiry
    type: run_shell_script_locally
    run: once
    script: |
      #!/bin/bash
      set -euo pipefail

      VMANAGE_HOST="{{ VMANAGE_HOST }}"
      VMANAGE_USERNAME="{{ VMANAGE_USERNAME }}"
      VMANAGE_PASSWORD="{{ VMANAGE_PASSWORD }}"
      THRESHOLD="{{ EXPIRY_THRESHOLD_DAYS }}"
      REPORT="/tmp/sdwan_cert_expiry_report.csv"

      COOKIE_FILE=$(mktemp)
      HEADER_FILE=$(mktemp)
      trap 'rm -f "$COOKIE_FILE" "$HEADER_FILE"' EXIT

      # ── Step 1: Authenticate ──────────────────────────────────────────────
      echo ">>> Authenticating to vManage at https://${VMANAGE_HOST} ..."
      curl -s -k -X POST \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -c "$COOKIE_FILE" -D "$HEADER_FILE" \
        --data-urlencode "j_username=${VMANAGE_USERNAME}" \
        --data-urlencode "j_password=${VMANAGE_PASSWORD}" \
        "https://${VMANAGE_HOST}/j_security_check" > /dev/null

      COOKIE_SET=$(grep -i "set-cookie" "$HEADER_FILE" | head -1)
      if [ -z "$COOKIE_SET" ]; then
        echo "ERROR: Authentication failed."
        exit 1
      fi
      echo "Authentication successful."

      # ── Step 2: Get XSRF token ────────────────────────────────────────────
      XSRF_TOKEN=$(curl -s -k -X GET \
        -b "$COOKIE_FILE" \
        "https://${VMANAGE_HOST}/dataservice/client/token")
      echo "Token acquired."

      # ── Step 3: Fetch certificate records ────────────────────────────────
      echo ""
      echo ">>> Fetching certificate records ..."
      CERTS=$(curl -s -k -X GET \
        -H "Content-Type: application/json" \
        -H "X-XSRF-TOKEN: ${XSRF_TOKEN}" \
        -b "$COOKIE_FILE" \
        "https://${VMANAGE_HOST}:443/dataservice/certificate/record")

      # ── Step 4: Parse and produce CSV report ─────────────────────────────
      echo ""
      echo ">>> Generating expiry report (threshold: ${THRESHOLD} days) ..."
      python3 - <<PYEOF
      import json, sys
      from datetime import datetime, timezone

      threshold = int("${THRESHOLD}")
      raw = """${CERTS}"""
      try:
          data = json.loads(raw).get("data", [])
      except Exception as e:
          print(f"ERROR: Could not parse certificate API response: {e}", file=sys.stderr)
          sys.exit(1)

      today = datetime.now(timezone.utc).date()
      expiring = []
      valid_devs = []

      for item in data:
          device_type   = item.get("deviceType", "")
          device_ip     = item.get("deviceIP", "")
          expiry_str    = item.get("expirationDate", "")
          valid         = item.get("valid", "")
          try:
              expiry_date = datetime.strptime(expiry_str, "%b %d %H:%M:%S %Y GMT").date()
              remaining   = (expiry_date - today).days
          except Exception:
              remaining = -1

          record = {
              "DeviceType": device_type,
              "IP":         device_ip,
              "ExpiryDate": expiry_str,
              "Valid":      valid,
              "RemainingDays": remaining,
          }
          if remaining < threshold:
              expiring.append(record)
          else:
              valid_devs.append(record)

      with open("${REPORT}", "w") as f:
          f.write("*******Devices going to expire soon*******\n")
          f.write("Category,DeviceType,IP,ExpiryDate,RemainingDays\n")
          for r in expiring:
              f.write(f"Expiring,{r['DeviceType']},{r['IP']},{r['ExpiryDate']},{r['RemainingDays']}\n")
          f.write("\n*******Devices with sufficient validity*******\n")
          f.write("Category,DeviceType,IP,ExpiryDate,RemainingDays\n")
          for r in valid_devs:
              f.write(f"Valid,{r['DeviceType']},{r['IP']},{r['ExpiryDate']},{r['RemainingDays']}\n")

      print(f"Devices expiring within {threshold} days: {len(expiring)}")
      print(f"Devices with sufficient validity:         {len(valid_devs)}")
      if expiring:
          print("\n--- Devices expiring soon ---")
          for r in expiring:
              print(f"  {r['DeviceType']:20s} {r['IP']:20s} Expiry={r['ExpiryDate']}  ({r['RemainingDays']} days)")
      PYEOF

      echo ""
      echo ">>> Certificate expiry report written to: ${REPORT}"
