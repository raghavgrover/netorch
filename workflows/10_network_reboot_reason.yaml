name: Network Device Reboot Reason
description: >
  Retrieves and reports the last reboot reason for network devices.
  Supports Cisco IOS/IOS-XE and Juniper Junos via native netorch SSH drivers.

  Platform support summary:
    cisco_ios / cisco_xe  : Uses "show version" — last reload reason appears
                            in the "System image file" or "Last reload reason"
                            line. Supported natively.
    juniper_junos         : Uses "show chassis routing-engine" — last reboot
                            reason appears in the "Last reboot" line.
                            Supported natively.
    aruba_aoscx           : NOT supported by netorch. Aruba AOS-CX requires
                            the arubanetworks.aoscx Ansible collection which
                            has no equivalent Netmiko/Paramiko driver.
                            Workaround: add Aruba devices as platform=linux
                            and use SSH show commands if the CLI permits, or
                            use run_shell_script_locally with sshpass.

  NOTE: Create separate device groups in inventory for Cisco and Juniper
  devices and run this workflow per-group, as the commands differ per platform.
  This file contains two separate workflows — one per platform.

  Run with the cisco_devices group for Cisco, junos_devices for Juniper.

parameters: []

# ─── STEP MAPPING ────────────────────────────────────────────────────────────
#  Cisco variant:
#    Step 1 — device_commands : "show version" (captures reload reason)
#
#  Juniper variant (use 10_network_reboot_reason_junos.yaml):
#    Step 1 — device_commands : "show chassis routing-engine"
#
#  Aruba AOS-CX: NOT feasible with native netorch drivers.
#  The original Ansible role uses the arubanetworks.aoscx collection.
#  No Netmiko driver exists for AOS-CX.
# ─────────────────────────────────────────────────────────────────────────────

steps:
  - name: get_reboot_reason
    type: device_commands
    commands:
      - "show version | include reason"
      - "show version | include reload"
      - "show logging | include Reload"
