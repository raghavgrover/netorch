name: test_sprint1_when
description: "Sprint1 — when condition"
steps:
  - name: get_version
    type: device_commands
    platform: [cisco_ios]
    commands:
      - "show version | include IOS"

  - name: should_run
    type: run_shell_script_locally
    run: once
    when: "steps.get_version.output contains IOS"
    script: |
      echo "WHEN_TRUE_RAN"

  - name: should_skip
    type: run_shell_script_locally
    run: once
    when: "steps.get_version.output contains IMPOSSIBLE_XYZ_MATCH"
    script: |
      echo "WHEN_FALSE_SHOULD_NOT_APPEAR"
