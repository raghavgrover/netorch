name: Downloads the BigFix Client package for Ubuntu OS
description: Downloads the BigFix Client package for Ubuntu OS locally and installs them on remote machines
parameters: []
vars: {}
steps:
  - name: Download Bigfix Agent and actionsite file
    type: shell
    run: once
    script: |-
      TMPDIR="/tmp/bigfix-install"
      mkdir -p "$TMPDIR"
      cd "$TMPDIR"

      wget -O BESAgent.deb \
      "https://software.bigfix.com/download/bes/110/BESAgent-11.0.6.137-ubuntu18.amd64.deb"

      # Download masthead
      wget -O actionsite.afxm \
      "http://10.1.160.143:52311/masthead/actionsite.afxm"
  - name: Transfer and Install BigFix Client package
    type: file_transfer
    local_path: /tmp/bigfix-install/BESAgent.deb
    remote_path: /tmp/BESAgent.deb
    post_transfer_commands:
      - dpkg -i /tmp/BESAgent.deb || apt-get install -f -y
  - name: Transfer Actionsite file and keep it in right place
    type: file_transfer
    local_path: /tmp/bigfix-install/actionsite.afxm
    remote_path: /tmp/actionsite.afxm
    post_transfer_commands:
      - mkdir -p /etc/opt/BESClient
      - cp /tmp/actionsite.afxm /etc/opt/BESClient/actionsite.afxm
  - name: Start the BES Client service
    type: device_commands
    commands:
      - systemctl enable besclient
      - systemctl restart besclient
      - echo "BigFix client installation completed."